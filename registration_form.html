<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form with Summary</title>

        <script>
            function showSummary(event) {
                event.preventDefault();

                let firstName = document.getElementById("first_name").value;
                let lastName =document.getElementById("last_name").value;
                let email = document.getElementById("email").value;
                let age = document.getElementById("age").value;

                let gender = document.querySelector('input[name="gender"]:checked');
                gender = gender ? gender.value : "";

                let interests = [];
                document.querySelectorAll('input[name="interests"]:checked')
                     .forEach((item) => interests.push(item.value));

                let table = `
                    <h3>Registration Summary</h3>
                    <table border="1" cellpadding="10" cellspacing="0">
                        <tr><th>Field</th><th>Value</th></tr>
                        <tr><td>First Name</td><td>${firstName}</td></tr>
                        <tr><td>Last Name</td><td>${lastName}</td></tr>
                        <tr><td>Email</td><td>${email}</td></tr>
                        <tr><td>Age</td><td>${age}</td></tr>
                        <tr><td>Gender</td><td>${gender}</td></tr>
                        <tr><td>Interests</td><td>${interests.join(", ")}</td></tr>
                    </table>
                `;
                document.getElementById("summary").innerHTML = table;
            }
        </script>
    </head>

    <body>
    <h2>User Registration Form</h2>

    <form onsubmit="showSummary(event)">

        First Name:
        <input type="text" id="first_name" required><br><br>

        Last Name:
        <input type="text" id="last_name" required><br><br>

        Email:
        <input type="email" id="email" required><br><br>

        Age:
        <input type="number" id="age"><br><br>

        Gender:<br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        Interests:<br>
        <input type="checkbox" name="interests" value="Reading"> Reading
        <input type="checkbox" name="interests" value="Writing"> Writing
        <input type="checkbox" name="interests" value="Coding"> Coding
        <input type="checkbox" name="interests" value="Gaming"> Gaming
        <br><br>

        <input type="submit" value="Submit">

    </form>

    <div id="summary"></div>
    
    </body>
</html>
