<!DOCTYPE html>
<html>
<head>
<title>Responsive Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GRID Layout */
.container {
    display: grid;
    grid-template-columns: 1fr 3fr;
    grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
}

/* Sections */
header {
    grid-area: header;
    background: black;
    color: white;
    padding: 15px;

    /* Flexbox */
    display: flex;
    justify-content: space-between;
}

aside {
    grid-area: sidebar;
    background: lightgray;
    padding: 15px;
}

main {
    grid-area: main;
    padding: 15px;

    /* Flexbox */
    display: flex;
    gap: 10px;
}

.box {
    background: skyblue;
    padding: 20px;
    flex: 1;
}

footer {
    grid-area: footer;
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
}

/* Media Query */
@media (max-width: 600px) {
    .container {
        grid-template-columns: 1fr;
        grid-template-areas:
            "header"
            "main"
            "sidebar"
            "footer";
    }

    main {
        flex-direction: column;
    }
}

</style>
</head>

<body>

<div class="container">

<header>
    <h3>My Site</h3>
    <p>Menu</p>
</header>

<aside>
    Sidebar
</aside>

<main>
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
</main>

<footer>
    Footer
</footer>

</div>

</body>
</html>
